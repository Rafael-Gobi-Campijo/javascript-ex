<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Calculadora Simples</h1>
    </header>
    <section>
        <div>
            <p><input type="text" name="num1" id="num1" placeholder="Primeiro Número"></p>
            <p><input type="text" name="num2" id="num2" placeholder="Segundo Número"></p>
        </div>
        <div>
            <select name="operacao" id="operacao">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
            <p><input type="button" value="Calcular" onclick="calcular()"></p>
        </div>
        <div id="resultado"></div>
    </section>
    <script src="script.js"></script>
</body>
</html>
